---
layout: default
---
<div class="container">
  <article class="post">
    <header class="post-header">
      <div class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
        {% if page.categories %}<span class="post-categories">{{ page.categories | join: ', ' }}</span>{% endif %}
      </div>
      <h1 class="post-title">{{ page.title }}</h1>
      {% if page.excerpt %}<p class="post-excerpt">{{ page.excerpt }}</p>{% endif %}
    </header>

    <div class="post-content">
      {{ content }}
    </div>

    <footer class="post-footer">
      <a href="{{ '/blog/' | relative_url }}" class="back-link">← Back to Blog</a>
    </footer>
  </article>
</div>
